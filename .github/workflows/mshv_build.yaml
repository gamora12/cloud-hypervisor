name: MSHV Cloudhypervisor Build
on: workflow_dispatch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build MSHV Cloudhypervisor
    runs-on: 
      - self-hosted
      - INTEL
    strategy:
      fail-fast: false
      matrix:
          RUNNER: 
          - 'INTEL-RUNNER-1'
          BUILD_CMD: 
          - 'cargo build'
          - 'cargo build --no-default-features --features "mshv,kvm"'
          - 'cargo build --no-default-features --features "mshv,kvm,sev_snp,igvm"'
          - 'cargo build --package vhost_user_net'
          - 'cargo build --package vhost_user_block'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install & login to AZ CLI
        run: |

          sudo apt-get install -y azure-cli
          az login --identity --username ${{ secrets.CLIENT_ID }}

      - name: Create Resource Group & Storage Account
        run: |

          az group create --name aasthagit --location westus2
          echo "Resource group created"
          az storage account create --name aastsamplestorage --resource-group aasthagit --location westus2 --sku Standard_LRS --allow-shared-key-access false
          echo "Storage account created"
      - name: Copy/Upload VHD to Azure Storage Account
        env: 
          SOURCE_PATH_X86: ${{ secrets.X86_SOURCE_PATH}}
          SOURCE_PATH_AARCH64: ${{ secrets.AARCH64_SOURCE_PATH}}
          STORAGE_ACCOUNT_PATH: ${{ secrets.MSHV_STORAGE_ACCOUNT_PATH }}
        run: |

          set -x

          # Login to Azure
          az login --identity --username ${{ secrets.CLIENT_ID }}

          # Install AzCopy
          echo "Installing AzCopy"
          wget https://aka.ms/downloadazcopy-v10-linux
          tar -xvzf downloadazcopy-v10-linux
          export PATH=$PATH:$PWD/azcopy_linux_amd64_10.25.1
          
          azcopy login --identity
          azcopy copy "${SOURCE_PATH_X86}" "${STORAGE_ACCOUNT_PATH}"
          
          if [ $? -ne 0 ]; then
            echo "AzCopy Failed: VHD upload failed"
            exit 1
          fi
            echo "AzCopy Succeeded: VHD upload complete"

          # Create Blob URL for the VHD
          echo "Creating Blob URL"
          blob_url=$(az storage blob url --auth-mode login --container-name vhds --account-name aastsamplestorage --name x86.vhd --output tsv)
          echo $blob_url

          # Create Image from the VHD
          echo "Creating Image"
          az image create --resource-group aasthagit --name vhd-image --source $blob_url --os-type Linux --location westus2 --hyper-v-generation V2
          echo "Image created"
          az image wait --image-name vhd-image --resource-group aasthagit --exists
          echo "Image is available"
          
      - name: Create DOM0 VM 
        run: |

          set -x

          # Create Dom0 VM
          echo "Creating VM"
          vm_creation=$(az vm create --resource-group aasthagit --name dom0_x86 --subnet ${{ secrets.SUBNET_ID }} --size Standard_d16s_v5 --location westus2 --image vhd-image --os-disk-size-gb 512 --public-ip-sku Standard --storage-sku Premium_LRS --admin-username ${{ secrets.ADMIN_USERNAME }} --admin-password ${{ secrets.ADMIN_PASSWORD }} --public-ip-address "")
          
          if [ $? -ne 0 ]; then
            echo "VM Creation Failed"
            exit 1
          fi
            echo "VM Creation Succeeded"
          echo $vm_creation
          
          echo "Retrieving VM Private IP address"
          
          # Get Private IP Address
          PRIVATE_IP=$(az vm show -g aasthagit -n dom0_x86 -d --query privateIps -o tsv)
          if [ $? -ne 0 ]; then
            echo "Failed to retrieve private IP address"
            exit 1
          fi
            echo "Successfully retrieved private IP address"
          echo $PRIVATE_IP

          # SSH into the VM via sshpass
          echo "Installing sshpass"
          sudo apt install sshpass -y
          echo "Removing the old host key"
          ssh-keygen -R $PRIVATE_IP
          echo "SSH into the VM"
          sshpass -p "${{ secrets.DOM0_PASSWORD }}" ssh -o StrictHostKeyChecking=no "${{secrets.DOM0_USERNAME}}"@$PRIVATE_IP << EOF
            set -x
            echo "Logged in"

            # Install Dependencies
            sudo tdnf install git moby-engine moby-cli build-essential m4 bison flex libuuid-devel qemu-img -y
            curl -sSf https://sh.rustup.rs | sh -s -- --default-toolchain stable --profile default -y
            export PATH="\$HOME/.cargo/bin:$PATH"

            # Clone Cloud-Hypervisor repo
            git clone https://github.com/cloud-hypervisor/cloud-hypervisor.git
            if [ $? -ne 0 ]; then
              echo "Clone failed for cloud-hypervisor repo"
            fi
            cd cloud-hypervisor

            # Checkout the given commit of cloud-hypervisor repo and build
            git checkout ${{ github.sha }}
            if [ $? -ne 0 ]; then
              echo "Checkout failed for: ${{ github.sha }}"
              exit 1
            fi 

            # Build Cloud-Hypervisor
            echo "Building Cloud-Hypervisor"
            ${{matrix.BUILD_CMD}} --release

            # Activate Docker
            sudo systemctl start docker
            sudo systemctl enable docker

            sudo ./scripts/dev_cli.sh tests --hypervisor mshv --integration
          EOF

      - name: Delete Resource Group
        run: |

            # Cleanup & deletion of Resource Group
            az group delete --name aasthagit --yes --no-wait
            echo "Resource group deleted"